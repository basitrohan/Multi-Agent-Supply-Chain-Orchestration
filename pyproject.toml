[tool.black]
line-length = 110
target-version = ["py312"]

[tool.ruff]
line-length = 110
target-version = "py312"
exclude = ["venv", ".venv", "data"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = ["E501"]  # line length handled by black

[tool.coverage.run]
source = ["app"]
omit = ["app/main.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
