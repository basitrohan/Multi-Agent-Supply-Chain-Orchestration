<svg width="700" height="600" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" role="img">
<title>SupplyChain Sentinel system architecture</title>
<desc>A layered architecture diagram showing a client calling FastAPI microservices, which invoke an orchestration service that runs the LangGraph multi-agent workflow, which in turn calls a simulation engine and an AWS Bedrock or mock LLM service, reading from local JSON data files and writing markdown reports to disk.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="600" fill="#FFFFFF"/>

<rect x="240" y="20" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Client / Swagger UI</text>
<line x1="340" y1="64" x2="340" y2="100" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="355" y="86" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">HTTP POST</text>

<rect x="40" y="100" width="600" height="70" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="60" y="124" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#042C53">FastAPI layer</text>
<text x="60" y="142" font-family="Arial, sans-serif" font-size="12" fill="#0C447C">app/api/routes.py</text>
<rect x="220" y="118" width="240" height="40" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="138" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">POST /api/v1/stress-test</text>

<line x1="340" y1="170" x2="340" y2="206" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="40" y="206" width="600" height="70" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="60" y="230" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#26215C">Orchestration service</text>
<text x="60" y="248" font-family="Arial, sans-serif" font-size="12" fill="#3C3489">app/services/orchestration_service.py</text>
<rect x="220" y="224" width="240" height="40" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="244" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">run_stress_test()</text>

<line x1="340" y1="276" x2="340" y2="312" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="40" y="312" width="600" height="80" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="60" y="334" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">LangGraph multi-agent workflow</text>
<text x="60" y="352" font-family="Arial, sans-serif" font-size="12" fill="#712B13">app/agents/graph.py - 5 nodes, conditional edges</text>
<rect x="60" y="362" width="105" height="20" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="112" y="372" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Ingestion</text>
<rect x="175" y="362" width="105" height="20" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="227" y="372" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Risk</text>
<rect x="290" y="362" width="105" height="20" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="342" y="372" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Simulation</text>
<rect x="405" y="362" width="105" height="20" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="457" y="372" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Forecast</text>
<rect x="520" y="362" width="105" height="20" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="572" y="372" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Report</text>

<line x1="200" y1="392" x2="200" y2="430" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="480" y1="392" x2="480" y2="430" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="60" y="430" width="280" height="60" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="200" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#412402">Simulation engine</text>
<text x="200" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#633806">Monte Carlo math (numpy)</text>

<rect x="340" y="430" width="280" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="480" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#04342C">LLM service</text>
<text x="480" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#085041">AWS Bedrock or mock</text>

<line x1="200" y1="490" x2="200" y2="520" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="480" y1="490" x2="480" y2="520" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="60" y="520" width="280" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="200" y="538" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">data/sample/*.json</text>
<text x="200" y="554" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Suppliers + inventory</text>

<rect x="340" y="520" width="280" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="480" y="538" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">data/reports/*.md</text>
<text x="480" y="554" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Generated reports</text>
</svg>
