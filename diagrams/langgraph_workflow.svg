<svg width="700" height="780" viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg" role="img">
<title>SupplyChain Sentinel multi-agent LangGraph workflow</title>
<desc>A flowchart showing five agents connected by conditional edges: Data Ingestion routes to Risk Assessment or ends on bad data; Risk Assessment flows to Simulation; Simulation can loop back to itself to escalate retries or proceed to Forecasting; Forecasting flows to Report Generation; Report Generation ends the workflow.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="760" fill="#FFFFFF"/>

<rect x="60" y="30" width="200" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="160" y="50" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Data ingestion agent</text>
<text x="160" y="68" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Loads + validates data</text>

<line x1="160" y1="86" x2="160" y2="130" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="175" y="108" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">data ok</text>

<rect x="380" y="40" width="160" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="460" y="62" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#501313">End: error report</text>
<path d="M260 58 L380 62" fill="none" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="270" y="48" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">data bad</text>

<rect x="60" y="130" width="200" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="160" y="150" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Risk assessment agent</text>
<text x="160" y="168" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Scores scenario risk</text>

<line x1="160" y1="186" x2="160" y2="240" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="60" y="240" width="200" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="160" y="260" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#412402">Simulation agent</text>
<text x="160" y="278" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#633806">Monte Carlo stress test</text>

<path d="M260 250 C 340 240, 340 200, 260 196" fill="none" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="345" y="218" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">risk too high:</text>
<text x="345" y="234" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">re-simulate</text>

<line x1="160" y1="296" x2="160" y2="350" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="175" y="320" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">accepted</text>

<rect x="60" y="350" width="200" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="160" y="370" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Forecasting agent</text>
<text x="160" y="388" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Builds YoY projection</text>

<line x1="160" y1="406" x2="160" y2="460" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="60" y="460" width="200" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="160" y="480" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#04342C">Report generation agent</text>
<text x="160" y="498" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#085041">Bedrock or mock LLM</text>

<line x1="160" y1="516" x2="160" y2="560" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="60" y="560" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="160" y="582" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">End: report saved</text>

<rect x="40" y="640" width="600" height="100" rx="10" fill="none" stroke="#888780" stroke-width="0.5"/>
<text x="60" y="664" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Legend</text>
<circle cx="67" cy="692" r="5" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="80" y="696" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Amber: the retry/escalation loop, the key agentic (non-linear) behavior</text>
<circle cx="67" cy="714" r="5" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="80" y="718" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Teal: external LLM call (AWS Bedrock, falls back to offline mock)</text>
</svg>
